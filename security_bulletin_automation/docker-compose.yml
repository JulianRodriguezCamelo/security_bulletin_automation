services:

  caronte-api:
    build: .
    container_name: caronte-api
    expose:
      - "5001"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      DATA_DIR: /app/data
    volumes:
      - ./users.yaml:/app/users.yaml
      - caronte_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5001/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: caronte-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - caronte-api
    restart: unless-stopped

volumes:
  caronte_data:
